# Full stack for local dev. Run from repo root: docker compose up --build
# Requires a .env file at repo root (copy from .env.example and fill values).
# For GPU (NVIDIA): docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

services:
  scriptify-backend:
    image: nisarg48/scriptify-backend:latest
    container_name: scriptify-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      PORT: ${PORT:-5000}
      MONGODB_URL: ${MONGODB_URL}
      JWT_SECRET: ${JWT_SECRET}
      # Billing (Stripe) — must be set in repo root .env; .env is not copied into the image
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-scriptify-transcribe-queue}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-scriptify-dev}
    depends_on:
      - scriptify-rabbitmq
      - scriptify-minio

  scriptify-frontend:
    image: nisarg48/scriptify-frontend:latest
    container_name: scriptify-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    ports:
      - "80:80"
    depends_on:
      - scriptify-backend

  scriptify-worker:
    image: nisarg48/scriptify-worker:latest
    container_name: scriptify-worker
    build:
      context: ./apps/ai_worker
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-scriptify-transcribe-queue}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-scriptify-dev}
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE_NAME: ${MONGODB_DATABASE_NAME:-scriptify_dev}
      SUPPORTED_EXTENSIONS: ${SUPPORTED_EXTENSIONS:-.mp3,.wav,.m4a,.flac,.ogg,.mp4,.mkv,.avi,.mov,.webm}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
    depends_on:
      - scriptify-rabbitmq
      - scriptify-minio

  scriptify-rabbitmq:
    image: rabbitmq:3-management
    container_name: scriptify-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_ENABLED_PLUGINS: rabbitmq_management,rabbitmq_prometheus
    networks:
      default:
        aliases:
          - rabbitmq

  scriptify-minio:
    image: minio/minio:latest
    container_name: scriptify-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
      # Browser uploads use presigned PUT to localhost:9000 — allow SPA origins
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    networks:
      default:
        aliases:
          - minio

  scriptify-prometheus:
    image: prom/prometheus:latest
    container_name: scriptify-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - scriptify-backend

  scriptify-grafana:
    image: grafana/grafana:latest
    container_name: scriptify-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER:-nisargdpatel48@gmail.com}
      GF_SMTP_FROM_NAME: Scriptify Monitoring
    depends_on:
      - scriptify-prometheus

volumes:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
