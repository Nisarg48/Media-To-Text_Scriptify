name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend ───────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            nisarg48/scriptify-backend:latest
            nisarg48/scriptify-backend:1.0.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            nisarg48/scriptify-frontend:latest
            nisarg48/scriptify-frontend:1.0.0
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI Worker ─────────────────────────────────────────────────────────────
      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ai_worker
          file: apps/ai_worker/Dockerfile
          push: true
          tags: |
            nisarg48/scriptify-worker:latest
            nisarg48/scriptify-worker:1.0.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
